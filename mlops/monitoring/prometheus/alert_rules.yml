groups:
  - name: ml_api_alerts
    rules:

      # API is down
      - alert: APIDown
        expr: up{job="tourism-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Tourism API is DOWN"
          description: "The prediction API has been unreachable for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: |
          rate(prediction_requests_total{status="error"}[5m])
          /
          rate(prediction_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High prediction error rate"
          description: "More than 5% of prediction requests are failing."

      # Slow predictions
      - alert: SlowPredictions
        expr: |
          histogram_quantile(0.95,
            rate(prediction_latency_seconds_bucket[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow prediction latency (p95 > 500ms)"
          description: "95th percentile prediction latency exceeds 500ms."

      # No traffic (possible silent failure)
      - alert: NoTraffic
        expr: rate(prediction_requests_total[10m]) == 0
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "No prediction requests in last 10 minutes"
          description: "API may be idle or receiving no traffic."
