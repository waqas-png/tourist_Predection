name: Scheduled — Model Health Check

on:
  schedule:
    - cron: "0 * * * *"   # Every hour
  workflow_dispatch:        # Manual trigger

jobs:
  health-check:
    name: API Health & Drift Check
    runs-on: ubuntu-latest

    steps:
      - name: Check API health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_URL }}/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ALERT: API health check failed with status $STATUS"
            exit 1
          fi

      - name: Check Prometheus metrics
        run: |
          # Query error rate from Prometheus
          RESULT=$(curl -s "${{ secrets.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode 'query=rate(prediction_requests_total{status="error"}[5m])' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['result'])")
          echo "Error rate result: $RESULT"

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            { "text": ":warning: *Hourly health check FAILED* for Tourism ML API" }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
