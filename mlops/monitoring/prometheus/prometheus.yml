global:
  scrape_interval:     15s   # Pull metrics every 15 seconds
  evaluation_interval: 15s   # Evaluate alerting rules every 15 seconds
  external_labels:
    env: "production"
    project: "tourism-mlops"

# ── Alerting rules file ──────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ── Alertmanager (optional) ──────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# ── Scrape targets ───────────────────────────────────────────
scrape_configs:

  # Tourism ML API
  - job_name: "tourism-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "ml-api"
          model:   "ridge-regression"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # cAdvisor — Docker container resource usage
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
